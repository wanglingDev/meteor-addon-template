name: Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download Meteor jar
        run: |
          mkdir -p libs
          curl -L "https://maven.meteordev.org/snapshots/meteordev/meteor-client/latest/meteor-client-latest.jar" \
            -o libs/meteor-client.jar

      - name: Download Baritone jar
        run: |
          curl -L "https://meteorclient.com/api/downloadBaritone" \
            -o libs/baritone-26.1.jar

      - name: Build
        run: ./gradlew build

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: end-ship-hunter
          path: build/libs/*.jar
