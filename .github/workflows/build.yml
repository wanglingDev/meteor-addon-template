name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Debug repo
        run: |
          ls -la repo/meteordevelopment/meteor-client/26.1.2-local/
          jar tf repo/meteordevelopment/meteor-client/26.1.2-local/meteor-client-26.1.2-local.jar | head -5

      - name: Download orbit
        run: |
          mkdir -p libs
          jar xf repo/meteordevelopment/meteor-client/26.1.2-local/meteor-client-26.1.2-local.jar META-INF/jars/orbit-0.2.4.jar
          mv META-INF/jars/orbit-0.2.4.jar libs/

      - name: Build
        run: ./gradlew build

      - uses: actions/upload-artifact@v4
        with:
          name: end-ship-hunter
          path: build/libs/*.jar
