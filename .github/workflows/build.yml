name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Meteor
        run: |
          mkdir -p libs tmp-meteor repo/meteordevelopment/meteor-client/26.1.2-local

          curl -fL "https://maven.meteordev.org/snapshots/meteordevelopment/meteor-client/26.1.2-SNAPSHOT/meteor-client-26.1.2-20260704.225351-37.jar" \
               -o libs/meteor-client-orig.jar

          # strip accessWidener
          cd tmp-meteor
          jar xf ../libs/meteor-client-orig.jar
          python3 -c "
import json
with open('fabric.mod.json') as f:
    d = json.load(f)
d.pop('accessWidener', None)
with open('fabric.mod.json', 'w') as f:
    json.dump(d, f)
"
          jar cf ../repo/meteordevelopment/meteor-client/26.1.2-local/meteor-client-26.1.2-local.jar .
          cd ..

          # buat POM minimal
          cat > repo/meteordevelopment/meteor-client/26.1.2-local/meteor-client-26.1.2-local.pom << 'POM'
<?xml version="1.0" encoding="UTF-8"?>
<project>
  <modelVersion>4.0.0</modelVersion>
  <groupId>meteordevelopment</groupId>
  <artifactId>meteor-client</artifactId>
  <version>26.1.2-local</version>
</project>
POM

          # extract orbit
          jar xf libs/meteor-client-orig.jar META-INF/jars/orbit-0.2.4.jar
          mv META-INF/jars/orbit-0.2.4.jar libs/
          ls -lh libs/ repo/meteordevelopment/meteor-client/26.1.2-local/

          ls -la repo/meteordevelopment/meteor-client/26.1.2-local/
          file repo/meteordevelopment/meteor-client/26.1.2-local/*.jar

      - name: Build
        run: ./gradlew build

      - uses: actions/upload-artifact@v4
        with:
          name: end-ship-hunter
          path: build/libs/*.jar
